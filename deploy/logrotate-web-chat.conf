# Пример logrotate для файловых логов uvicorn (если пишете в logs/uvicorn.log).
# Установка: sudo cp deploy/logrotate-web-chat.conf /etc/logrotate.d/web-chat
# Путь к логу должен совпадать с вашим unit/скриптом запуска.

/root/web-chat/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
