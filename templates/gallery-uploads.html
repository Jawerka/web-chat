<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} — web-chat</title>
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/chat-layout.css">
  <link rel="stylesheet" href="/static/css/gallery.css">
  <link rel="stylesheet" href="/static/css/gallery-uploads.css">
  <link rel="stylesheet" href="/static/css/uploads-ref-lightbox.css">
  <script>
    (function () {
      var stored = localStorage.getItem('webchat_theme');
      var dark = stored === 'dark'
        || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('gallery-dark');
    })();
  </script>
</head>
<body class="gallery-body styled-scrollbar">
  <script>
    if (document.documentElement.classList.contains('gallery-dark')) {
      document.body.classList.add('dark-theme');
    }
    window.addEventListener('storage', function (e) {
      if (e.key !== 'webchat_theme') return;
      var dark = e.newValue === 'dark';
      document.body.classList.toggle('dark-theme', dark);
      document.documentElement.classList.toggle('gallery-dark', dark);
    });
  </script>

  <div class="gallery-page">
    <header class="gallery-header">
      <div class="gallery-header-text">
        <h1 id="uploads-page-title" class="type-title">Галерея загрузок</h1>
        <p class="gallery-subtitle type-meta">
          <span id="uploads-count">0</span> изображений · хранение без срока
        </p>
      </div>
      <div class="gallery-header-actions">
        <span id="uploads-status" class="gallery-status" role="status" aria-live="polite"></span>
        <input type="file" id="uploads-file-input" accept="image/*" multiple hidden>
        <button type="button" class="btn btn-primary btn-sm" id="uploads-upload-btn">Загрузить</button>
        <a href="/gallery" class="btn btn-secondary btn-sm">Галерея генераций</a>
        <a href="/" class="btn btn-secondary btn-sm">← К чату</a>
      </div>
    </header>

    <div id="uploads-empty" class="gallery-empty empty-state hidden" role="status">
      <p class="empty-state-title">Галерея загрузок пуста</p>
      <p class="empty-state-text type-hint">Загрузите изображения — они сохранятся без ограничения по времени</p>
      <button type="button" class="btn btn-primary btn-sm gallery-empty-cta" id="uploads-empty-upload">Загрузить файлы</button>
    </div>
    <div id="uploads-grid" class="gallery-grid hidden"></div>
  </div>

  <nav class="gallery-scroll-nav" aria-label="Прокрутка страницы">
    <button type="button" class="gallery-scroll-btn gallery-scroll-btn--top" id="gallery-scroll-top" title="В начало" aria-label="В начало" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <button type="button" class="gallery-scroll-btn gallery-scroll-btn--bottom" id="gallery-scroll-bottom" title="В конец" aria-label="В конец" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </nav>

  <div id="uploads-ref-lightbox" class="uploads-ref-lightbox hidden" role="dialog" aria-modal="true" aria-label="Просмотр загрузки">
    <div class="uploads-ref-topbar">
      <span class="uploads-ref-counter" id="uploads-ref-counter"></span>
      <label class="sr-only" for="uploads-ref-chat-comment">Комментарий к отправке в чат</label>
      <textarea id="uploads-ref-chat-comment" class="uploads-ref-chat-comment" rows="1" placeholder="Комментарий к чату…" spellcheck="true"></textarea>
      <button type="button" class="uploads-ref-attach btn btn-secondary btn-sm" id="uploads-ref-attach" title="Новый чат с этим изображением" aria-label="Прикрепить в новый чат">В чат</button>
      <button type="button" class="uploads-ref-close" id="uploads-ref-close" title="Закрыть (Esc)" aria-label="Закрыть">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="uploads-ref-main">
      <div class="uploads-ref-image-pane">
        <button type="button" class="uploads-ref-arrow uploads-ref-prev" id="uploads-ref-prev" aria-label="Предыдущее">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <img id="uploads-ref-image" alt="" decoding="async">
        <button type="button" class="uploads-ref-arrow uploads-ref-next" id="uploads-ref-next" aria-label="Следующее">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <aside class="uploads-ref-info">
        <div class="uploads-ref-block uploads-ref-prompt">
          <div class="uploads-ref-block-head">
            <span class="uploads-ref-label">Prompt</span>
            <button type="button" class="uploads-ref-copy" data-copy="prompt" title="Копировать prompt" aria-label="Копировать prompt">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <textarea id="uploads-ref-prompt" readonly spellcheck="false"></textarea>
        </div>
        <div class="uploads-ref-block uploads-ref-negative">
          <div class="uploads-ref-block-head">
            <span class="uploads-ref-label">Negative</span>
            <button type="button" class="uploads-ref-copy" data-copy="negative" title="Копировать negative" aria-label="Копировать negative">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <textarea id="uploads-ref-negative" readonly spellcheck="false"></textarea>
        </div>
        <div class="uploads-ref-block uploads-ref-params">
          <div class="uploads-ref-block-head">
            <span class="uploads-ref-label">Параметры</span>
            <button type="button" class="uploads-ref-copy" data-copy="params" title="Копировать параметры" aria-label="Копировать параметры">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <textarea id="uploads-ref-params" readonly spellcheck="false"></textarea>
        </div>
        <button type="button" class="uploads-ref-copy-all" id="uploads-ref-copy-all" title="Копировать всё" aria-label="Копировать всё">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button type="button" class="uploads-ref-extract hidden" id="uploads-ref-extract" title="Извлечь метаданные SD">Извлечь метаданные</button>
      </aside>
    </div>
    <div class="uploads-ref-strip" id="uploads-ref-strip"></div>
    <div id="uploads-ref-zoom" class="uploads-ref-zoom hidden" aria-hidden="true">
      <img id="uploads-ref-zoom-img" alt="">
    </div>
  </div>

  <script src="/static/js/storage-migrate.js"></script>
  <script src="/static/js/dom-utils.js"></script>
  <script src="/static/js/media-urls.js"></script>
  <script src="/static/js/base-reconnecting-socket.js"></script>
  <script src="/static/js/system-events.js"></script>
  <script src="/static/js/gallery-common.js"></script>
  <script src="/static/js/uploads-ref-lightbox.js"></script>
  <script src="/static/js/gallery-uploads.js"></script>
</body>
</html>
